name: Deploy to GitHub Pages

on:
  push:
    branches:
      - '**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute deploy target
        id: vars
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            echo "deploy_dir=pr/${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "base_path=/${REPO_NAME}/pr/${PR_NUMBER}/" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "deploy_dir=" >> "$GITHUB_OUTPUT"
            echo "base_path=/${REPO_NAME}/" >> "$GITHUB_OUTPUT"
          else
            SANITIZED_BRANCH="$(printf '%s' "${GITHUB_REF_NAME}" | sed -E 's#[^A-Za-z0-9._-]#_#g')"
            echo "deploy_dir=branch/${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"
            echo "base_path=/${REPO_NAME}/branch/${SANITIZED_BRANCH}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build -- --base "${{ steps.vars.outputs.base_path }}"

      - name: Deploy main site
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: false
          keep_files: true

      - name: Deploy preview site
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name != 'main')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.vars.outputs.deploy_dir }}
          force_orphan: false
          keep_files: true
