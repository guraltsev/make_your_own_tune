name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-${{ github.event_name }}-${{ github.ref }}-${{ github.event.pull_request.number || 'na' }}
  cancel-in-progress: true

jobs:
  deploy-main:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build main site
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          BASE_PATH="/${REPO_NAME}/"
          echo "Building main site with base path: ${BASE_PATH}"
          npm run build -- --base "${BASE_PATH}"

      - name: Deploy main site to root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: .
          keep_files: true

      - name: Log main deployment URL
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          URL="https://${OWNER}.github.io/${REPO_NAME}/"
          echo "::notice title=GitHub Pages (main)::${URL}"
          echo "Main deployment URL: ${URL}"

  deploy-branch-preview:
    if: github.event_name == 'push' && github.ref_name != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute branch preview path
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          BRANCH_SLUG="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9._-]+#-#g; s#-+#-#g; s#(^-|-$)##g')"
          DEPLOY_PATH="branch/${BRANCH_SLUG}"
          BASE_PATH="/${REPO_NAME}/${DEPLOY_PATH}/"
          FULL_URL="https://${OWNER}.github.io/${REPO_NAME}/${DEPLOY_PATH}/"

          echo "branch_slug=${BRANCH_SLUG}" >> "$GITHUB_OUTPUT"
          echo "deploy_path=${DEPLOY_PATH}" >> "$GITHUB_OUTPUT"
          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"
          echo "full_url=${FULL_URL}" >> "$GITHUB_OUTPUT"

          echo "::notice title=Branch Preview Path::/${DEPLOY_PATH}"
          echo "::notice title=Branch Preview URL::${FULL_URL}"
          echo "Branch '${GITHUB_REF_NAME}' will deploy to: /${DEPLOY_PATH}"
          echo "Branch preview URL: ${FULL_URL}"

      - name: Build branch preview
        run: npm run build -- --base "${{ steps.vars.outputs.base_path }}"

      - name: Deploy branch preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.vars.outputs.deploy_path }}
          keep_files: true

      - name: Confirm branch preview URL
        run: |
          echo "============================================"
          echo "Branch preview deployed successfully"
          echo "URL: ${{ steps.vars.outputs.full_url }}"
          echo "Path: /${{ steps.vars.outputs.deploy_path }}"
          echo "============================================"

  deploy-pr-preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute PR preview path
        id: vars
        run: |
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          DEPLOY_PATH="pr/${PR_NUMBER}"
          BASE_PATH="/${REPO_NAME}/${DEPLOY_PATH}/"
          FULL_URL="https://${OWNER}.github.io/${REPO_NAME}/${DEPLOY_PATH}/"

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "deploy_path=${DEPLOY_PATH}" >> "$GITHUB_OUTPUT"
          echo "base_path=${BASE_PATH}" >> "$GITHUB_OUTPUT"
          echo "full_url=${FULL_URL}" >> "$GITHUB_OUTPUT"

          echo "::notice title=PR Preview Path::/${DEPLOY_PATH}"
          echo "::notice title=PR Preview URL::${FULL_URL}"
          echo "PR #${PR_NUMBER} will deploy to predictable path: /${DEPLOY_PATH}"
          echo "PR preview URL: ${FULL_URL}"

      - name: Build PR preview
        run: npm run build -- --base "${{ steps.vars.outputs.base_path }}"

      - name: Deploy PR preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.vars.outputs.deploy_path }}
          keep_files: true

      - name: Confirm PR preview URL
        run: |
          echo "============================================"
          echo "PR preview deployed successfully"
          echo "PR: #${{ steps.vars.outputs.pr_number }}"
          echo "URL: ${{ steps.vars.outputs.full_url }}"
          echo "Path: /${{ steps.vars.outputs.deploy_path }}"
          echo "============================================"
